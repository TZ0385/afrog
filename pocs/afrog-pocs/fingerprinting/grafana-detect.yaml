id: grafana-panel

info:
  name: Grafana Panel
  author: organiccrap
  severity: info
  verified: true
  description: |-
    Grafana panel was detected.
    fofa: app="Grafana"
  tags: grafana,panel
  created: 2023/06/14

rules:
  r0:
    brute:
      p:
        - /login
        - /grafana/login
    request:
      method: GET
      path: "{{p}}"
    expression: response.status == 200 && response.body.ibcontains(b'<title>Grafana</title>')
expression: r0()
